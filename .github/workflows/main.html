<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets CSV Search</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Google Sheets Search</h1>
        <input id="searchInput" class="form-control mt-3" type="text" placeholder="輸入關鍵字搜尋...">
        <ul id="resultsList" class="list-group mt-3"></ul>
    </div>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQi1fRnC5vjYzmbgzxQIFk2ihboM8FGPFe5eGAZCt7KhEzGGDR9EZwaBR5v5DC_VmWASCP1b5DW2XtZ/pub?output=csv';

        $.get(sheetURL, function(data) {
            const rows = data.split('\n').map(row => row.split(','));
            $('#searchInput').on('input', function() {
                const query = $(this).val().toLowerCase();
                const filteredRows = rows.filter(row => row.some(cell => cell.toLowerCase().includes(query)));
                
                $('#resultsList').empty();
                filteredRows.forEach(row => {
                    $('#resultsList').append(`<li class="list-group-item">${row.join(' - ')}</li>`);
                });
            });
        });
    </script>
</body>
</html>
