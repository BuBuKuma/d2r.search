<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Search</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Google Sheets Search</h1>
        <input id="searchInput" class="form-control mt-3" type="text" placeholder="輸入關鍵字搜尋...">
        <ul id="resultsList" class="list-group mt-3"></ul>
    </div>

    <script>
        // 多個工作表的 CSV 連結
        const sheetURLs = [
            'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_iT8Z082SrWOtPxoKwO4G_C89MPM5Q4i4-RzHDt_zyXiQsI9QTu8AJ5IQRaETGJL1FygOPu9aimmB/pub?output=csv',
            // 可以添加更多的工作表連結
        ];

        let allRows = [];

        // 從所有工作表讀取資料
        function fetchData() {
            let requests = sheetURLs.map(url => $.get(url));
            $.when.apply($, requests).done(function() {
                Array.prototype.slice.call(arguments).forEach(response => {
                    const data = response[0].split('\n').map(row => row.split(','));
                    allRows = allRows.concat(data);
                });

                // 初始化搜尋功能
                initSearch();
            });
        }

        function initSearch() {
            $('#searchInput').on('input', function() {
                const query = $(this).val().toLowerCase();
                const filteredRows = allRows.filter(row => {
                    for (let i = 0; i < row.length; i += 3) {
                        if (row[i].toLowerCase().includes(query) ||
                            row[i + 1].toLowerCase().includes(query) ||
                            row[i + 2].toLowerCase().includes(query)) {
                            return true;
                        }
                    }
                    return false;
                });

                $('#resultsList').empty();
                filteredRows.forEach(row => {
                    for (let i = 0; i < row.length; i += 3) {
                        $('#resultsList').append(`
                            <li class="list-group-item">
                                <strong>名稱:</strong> ${row[i]}<br>
                                <strong>素質:</strong> ${row[i + 1]}<br>
                                <strong>位置:</strong> ${row[i + 2]}
                            </li>
                        `);
                    }
                });
            });
        }

        $(document).ready(fetchData);
    </script>
</body>
</html>
