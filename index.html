<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Search</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Google Sheets Search</h1>
        <input id="searchInput" class="form-control mt-3" type="text" placeholder="輸入關鍵字搜尋...">
        <table id="resultsTable" class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>名稱</th>
                    <th>素質</th>
                    <th>類型</th>
                    <th>位置</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script>
        // 多個工作表的 CSV 連結
        const mainURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_iT8Z082SrWOtPxoKwO4G_C89MPM5Q4i4-RzHDt_zyXiQsI9QTu8AJ5IQRaETGJL1FygOPu9aimmB/pub?gid=2005473659&single=true&output=csv';
        let allRows = [];

        // 從所有工作表讀取資料  
        function fetchData() {
            $.get(mainURL, function(mainData) {
                const sheets = mainData.split('\n').map(row => row.split(','));
                sheets.forEach((sheet) => {
                    const name = sheet[0];
                    const url = sheet[1];
                    if(name != '工作表' && name != '紀錄'){
                        $.get(url, function(sheetData) {
                            const data = sheetData.split('\n').map((row) => {
                                return [name].concat(row.split(','))
                            });
                            data.push();
                            allRows = allRows.concat(data);
                        });
                    }
                });

                // 初始化搜尋功能
                initSearch();
            });
        }

        function initSearch() {
            $('#searchInput').on('input', function() {
                const query = $(this).val().toLowerCase();
                const filteredRows = [];

                allRows.forEach(row => {
                    for (let i = 0; i < row.length; i += 3) {
                        if (row[i].toLowerCase().includes(query) ||
                            row[i + 1].toLowerCase().includes(query) ||
                            row[i + 2].toLowerCase().includes(query)) {
                            filteredRows.push([row[i], row[i + 1], row[i + 2]], row[i + 3]);
                        }
                    }
                });

                // 清空表格
                $('#resultsTable tbody').empty();

                // 添加篩選後的結果
                filteredRows.forEach(row => {
                    $('#resultsTable tbody').append(`
                        <tr>
                            <td>${row[1]}</td>
                            <td>${row[2]}</td>
                            <td>${row[0]}</td>
                            <td>${row[3]}</td>
                        </tr>
                    `);
                });
            });
        }

        $(document).ready(fetchData);
    </script>
</body>
</html>
