<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2R Search</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5" data-toggle="tooltip" data-placement="right" title="給我自己方便查找的工具 @neil.hsiao.1986">D2R Search</h1>
        <input id="searchInput" class="form-control mt-3" type="text" placeholder="輸入關鍵字搜尋...">
        <table id="resultsTable" class="table table-hover mt-3">
            <thead>
                <tr>
                    <th>名稱</th>
                    <th>素質</th>
                    <th>類型</th>
                    <th>位置</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script>
        $(function () {
          $('[data-toggle="tooltip"]').tooltip()
        })
        
        const mainURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_iT8Z082SrWOtPxoKwO4G_C89MPM5Q4i4-RzHDt_zyXiQsI9QTu8AJ5IQRaETGJL1FygOPu9aimmB/pub?gid=2005473659&single=true&output=csv';
        let allRows = [];

        function fetchData() {
            $.get(mainURL, function(mainData) {
                const sheets = mainData.split('\r\n').map(row => row.split(','));
                sheets.forEach((sheet) => {
                    const name = sheet[0];
                    const url = sheet[1];
                    if(name != '工作表' && name != '紀錄'){
                        $.get(url, function(sheetData) {
                            const data = sheetData.split('\r\n').map((row) => {
                                return [name].concat(row.split(','))
                            });
                            allRows = allRows.concat(data);
                        });
                    }
                });

                initSearch();
            });
        }

        function initSearch() {
            $('#searchInput').on('input', function() {
                const query = $(this).val().toLowerCase();
                const filteredRows = [];

                allRows.forEach(row => {
                    const type = row[0];
                    const _row = row.slice(1, -1);
                    for (let i = 0; i < _row.length; i += 3) {
                        if (_row[i].toLowerCase().includes(query)) {
                            if(_row[i]){
                                filteredRows.push([_row[i], _row[i + 1] || '', type, _row[i + 2] || '']);
                            }
                        }
                    }
                });

                $('#resultsTable tbody').empty();

                filteredRows.forEach(row => {
                    if(row[1]?.startsWith('*')){
                        $('#resultsTable tbody').append(`
                            <tr class="table-warning">
                                <td>${row[0]}</td>
                                <td>${row[1]}</td>
                                <td>${row[2]}</td>
                                <td>${row[3]}</td>
                            </tr>
                        `);
                    } else {
                        $('#resultsTable tbody').append(`
                            <tr>
                                <td>${row[0]}</td>
                                <td>${row[1]}</td>
                                <td>${row[2]}</td>
                                <td>${row[3]}</td>
                            </tr>
                        `);
                    }
                });
            });
        }

        $(document).ready(fetchData);
    </script>
</body>
</html>
